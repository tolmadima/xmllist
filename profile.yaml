mode: rule
allow-lan: true
unified-delay: true

proxy-providers:
  Relity_vless_white:
    type: http
    url: "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt"
    path: ./providers/Relity_vless_white.yaml
    interval: 900
    health-check:
      enable: true
      url: "http://www.github.com/generate_204"
      interval: 60

  Relity_vless_white_2:
    type: http
    url: "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt"
    path: ./providers/Relity_vless_white_2.yaml
    interval: 900
    health-check:
      enable: true
      url: "http://www.github.com/generate_204"
      interval: 60

  Relity_vless_sni_white:
    type: http
    url: "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-SNI-RU-all.txt"
    path: ./providers/Relity_vless_sni_white.yaml
    interval: 900
    health-check:
      enable: true
      url: "http://www.github.com/generate_204"
      interval: 60

  zieng2:
    type: http
    url: "https://raw.githubusercontent.com/zieng2/wl/main/vless_universal.txt"
    path: ./providers/zieng2.yaml
    interval: 900
    health-check:
      enable: true
      url: "http://www.github.com/generate_204"
      interval: 60

  CIDR_all:
    type: http
    url: "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-all.txt"
    path: ./providers/CIDR_all.yaml
    interval: 900
    health-check:
      enable: true
      url: "http://www.github.com/generate_204"
      interval: 60

      # Финальная группа для всего остального трафика
  

proxy-groups:
  # Telegram с автоматическим fallback на EbnuliVse
  - name: "Telegram-Fallback"
    type: fallback
    proxies:
      - Telegram
      - EbnuliVse
    url: "http://149.154.167.99"
    interval: 30
    timeout: 5000
    lazy: true

  # Telegram (оригинальная url-test группа)
  - name: "Telegram"
    type: url-test
    use:
      - zieng2
      - Relity_vless_white
      - Relity_vless_white_2
      - Relity_vless_sni_white
    url: "http://149.154.167.99"
    interval: 30
    tolerance: 35

  # EbnuliVse (fallback цель)
  - name: "EbnuliVse"
    type: url-test
    use:
      - CIDR_all
    url: "http://www.github.com/generate_204"
    interval: 30
    tolerance: 35

  - name: "AutoSelect"
    type: url-test  # Автовыбор лучшего
    use:
      - Relity_vless_white
      - Relity_vless_white_2
      - Relity_vless_sni_white
      - zieng2
      - CIDR_all
    url: "http://www.github.com/generate_204"
    interval: 30
    tolerance: 35

rule-providers:
  telegramcidr:
    type: http
    behavior: ipcidr
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/telegramcidr.txt"
    path: ./ruleset/telegramcidr.yaml
    interval: 1800

rules:
  # Telegram → Telegram-Fallback (с авто-fallback на EbnuliVse)
  - RULE-SET,telegramcidr,Telegram-Fallback
  - DOMAIN-SUFFIX,t.me,Telegram-Fallback
  - DOMAIN-SUFFIX,telegram.me,Telegram-Fallback
  - DOMAIN-SUFFIX,telegram.org,Telegram-Fallback
  - DOMAIN-SUFFIX,telesco.pe,Telegram-Fallback
  
  # Россия → DIRECT
  - GEOIP,RU,DIRECT
  - GEOIP,RS,DIRECT
  - DOMAIN-SUFFIX,ru,DIRECT
  - DOMAIN-SUFFIX,рф,DIRECT
  - DOMAIN-SUFFIX,yandex.ru,DIRECT
  - DOMAIN-SUFFIX,yandex.com,DIRECT
  - DOMAIN-SUFFIX,vk.com,DIRECT
  - DOMAIN-SUFFIX,vk.ru,DIRECT
  - DOMAIN-SUFFIX,mail.ru,DIRECT
  - DOMAIN-SUFFIX,rambler.ru,DIRECT
  
  - MATCH,AutoSelect
