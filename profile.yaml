mode: rule
allow-lan: true
unified-delay: true

proxy-providers:
  Relity_vless_white:
    type: http
    url: "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/Vless-Reality-White-Lists-Rus-Mobile.txt"
    path: ./providers/Relity_vless_white.yaml
    interval: 900
    health-check:
      enable: true
      url: "http://www.github.com/generate_204"
      interval: 60

  MyGithubSub:
    type: http
    url: "https://raw.githubusercontent.com/zieng2/wl/main/vless_universal.txt"
    path: ./providers/MyGithubSub.yaml
    interval: 900
    health-check:
      enable: true
      url: "http://www.github.com/generate_204"
      interval: 60

proxy-groups:
  # ЕДИНАЯ группа - автоматически берёт ВСЕ прокси из обоих провайдеров
  - name: "AutoSelect"
    type: url-test
    use:
      - Relity_vless_white  # Все ноды из Reality
      - MyGithubSub         # Все ноды из Github
    url: "http://www.github.com/generate_204"
    interval: 30
    tolerance: 35
  
  # Telegram отдельно
  - name: "Telegram"
    type: url-test
    use:
      - Relity_vless_white
      - MyGithubSub
    exclude-filter: "🇷🇺"
    url: "http://www.github.com/generate_204"
    interval: 30
    tolerance: 35

rule-providers:
  telegramcidr:
    type: http
    behavior: ipcidr
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/telegramcidr.txt"
    path: ./ruleset/telegramcidr.yaml
    interval: 1800

rules:
  # Telegram
  - RULE-SET,telegramcidr,Telegram
  - DOMAIN-SUFFIX,t.me,Telegram
  - DOMAIN-SUFFIX,telegram.me,Telegram
  - DOMAIN-SUFFIX,telegram.org,Telegram
  - DOMAIN-SUFFIX,telesco.pe,Telegram
  
  # Россия → DIRECT
  - GEOIP,RU,DIRECT
  - GEOIP,RS,DIRECT
  - DOMAIN-SUFFIX,ru,DIRECT
  - DOMAIN-SUFFIX,рф,DIRECT
  - DOMAIN-SUFFIX,yandex.ru,DIRECT
  - DOMAIN-SUFFIX,yandex.com,DIRECT
  - DOMAIN-SUFFIX,vk.com,DIRECT
  - DOMAIN-SUFFIX,vk.ru,DIRECT
  - DOMAIN-SUFFIX,mail.ru,DIRECT
  - DOMAIN-SUFFIX,rambler.ru,DIRECT
  
  - MATCH,AutoSelect
